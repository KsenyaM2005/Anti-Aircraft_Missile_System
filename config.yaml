# Air Defense System Simulator Configuration
# Based on the architecture diagrams

Simulation:
  name: "ADS Simulation"
  random_seed: 42
  max_duration: 90.0  # seconds

Environment:
  time_step: 0.02 # 0.005
  
  # Atmospheric conditions
  atmosphere:
    temperature: 15.0
    pressure: 1013.25
    humidity: 50.0
    wind_speed: 5.0
    wind_direction: 45.0
    weather: "CLEAR"  # CLEAR, LIGHT_RAIN, HEAVY_RAIN, FOG, STORM
  
  # Radar noise model
  radar_noise:
    range_noise: 8.0
    angle_noise: 0.35
    doppler_noise: 1.0
    detection_probability: 0.98
  
  # Simulation boundaries
  boundaries:
    x: [0, 12000]
    y: [0, 10000]
    z: [0, 6000]
  
  # Target definitions
  targets:
    0:
      trajectory_type: "uniform"
      trajectory_arguments:
        position: [ 1200, 4300, 900 ]
        velocity: [ 250, 40, 0 ]
      type: "FIGHTER"
      rcs: 2.0
      rcs_fluctuation: 0.1

    1:
      trajectory_type: "uniform"
      trajectory_arguments:
        position: [ 9300, 2600, 1800 ]
        velocity: [ -170, 160, -10 ]
      type: "BOMBER"
      rcs: 5.0

    2:
      trajectory_type: "uniform"
      trajectory_arguments:
        position: [ 700, 5000, 120 ]
        velocity: [ 320, 0, 0 ]
      type: "CRUISE_MISSILE"
      rcs: 0.12

Pbu:
  time_step: 0.02
  add_distance: 300.0
  min_engagement_interval: 0.6
  
  # Defended assets (positions to protect)
  defended_assets:
    - [5000, 5000, 0]
  
  # Threat assessment parameters
  threat_assessment:
    speed_threshold_high: 240.0
    speed_threshold_critical: 320.0
    range_threshold_low: 6500.0
    range_threshold_high: 2800.0
  
  # Launcher definitions
  launchers:
    1:
      launcher_pos: [2600, 3000, 0]
      missile_amount: 8
      speed: 950
      missile_type: "guided missile"
      trigger_distance: 30 #18.0
      explosion_range: 120.0
      traverse_speed: 150.0
      elevation_speed: 70.0
      reload_time: 12.0
    
    2:
      launcher_pos: [7600, 7000, 0]
      missile_amount: 8
      speed: 1100
      missile_type: "guided missile"
      trigger_distance: 30 #18.0
      explosion_range: 150.0
      traverse_speed: 150.0
      elevation_speed: 70.0
    
    3:
      launcher_pos: [5000, 5000, 0]
      missile_amount: 12
      speed: 1250
      missile_type: "preemptive missile"
      trigger_distance: 30 #18.0
      explosion_range: 150.0
      traverse_speed: 180.0
      elevation_speed: 80.0

Locator:
  1: # left
    time_step: 0.02
    position:
      x: 1000
      y: 4700
      z: 0
    omega_az: 90
    omega_el: 18
    r_max: 7000
    dr: 25
    beam_width_az: 12.0
    beam_width_el: 12.0
    scan_sector_az: [ 0, 360 ]
    scan_sector_el: [ 0, 90 ]
    initial_azimuth: 180
    initial_elevation: 6
    receiver:
      range_noise: 8.0
      angle_noise: 0.35
      doppler_noise: 1.0
      detection_probability: 0.98

  2: # right
    time_step: 0.02
    position:
      x: 8000
      y: 5300
      z: 0
    omega_az: 90
    omega_el: 18
    r_max: 7000
    dr: 25
    beam_width_az: 12.0
    beam_width_el: 12.0
    scan_sector_az: [ 0, 360 ]
    scan_sector_el: [ 0, 90 ]
    initial_azimuth: 175
    initial_elevation: 10
    receiver:
      range_noise: 8.0
      angle_noise: 0.35
      doppler_noise: 1.0
      detection_probability: 0.98

  3:  # центр, на ПБУ
    time_step: 0.02
    position:
      x: 5000
      y: 5000
      z: 0
    r_max: 8000
    omega_az: 120
    omega_el: 50
    beam_width_az: 5.0
    beam_width_el: 10.0
    dr: 5.0
    scan_sector_az: [ 0, 360 ]
    scan_sector_el: [ 0, 90 ]
    initial_azimuth: 175
    initial_elevation: 10
    receiver:
      range_noise: 8.0
      angle_noise: 0.35
      doppler_noise: 1.0
      detection_probability: 0.98

# Scenario configuration (timed spawns)
Scenario:
  enabled: false
  spawns:
    - time: 5.0
      target:
        trajectory_type: "uniform"
        trajectory_arguments:
          position: [1000, 8000, 2000]
          velocity: [300, -200, -50]
        type: "CRUISE_MISSILE"
        rcs: 0.1
    
    - time: 15.0
      target:
        trajectory_type: "sinusoidal"
        trajectory_arguments:
          position: [0, 5000, 1000]
          velocity: [250, 0, 0]
          amplitude: 200.0
          frequency: 0.05
        type: "FIGHTER"
        rcs: 2.0

# Visualization settings
Visualization:
  window_size: [14, 10]
  fps: 30
  skip_frames: 5
  show_trails: true
  trail_length: 40
  colors:
    radar: "blue"
    launcher: "orange"
    target_low: "yellow"
    target_medium: "orange"
    target_high: "red"
    target_critical: "darkred"
    missile: "cyan"
    defended_asset: "gold"
